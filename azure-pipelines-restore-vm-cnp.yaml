name: Azure RSV VM Restore - CNP

trigger: none
pr: none

parameters:
  - name: serviceConnection
    type: string
    default: DCD-CNP-Prod
  - name: agentPool
    type: string
    default: hmcts-cftptl-agent-pool
    values:
      - hmcts-cftptl-agent-pool
      - hmcts-sds-ptl
      - hmcts-sandbox-agent-pool
      - hmcts-sds-ptlsbox
  # Which restore method to use. Maps to BCDR failure scenarios:
  #   method-c  Replace Existing (OriginalLocation, in-place)  — S2: VM non-bootable
  #   method-a  Create New VM   (AlternateLocation)            — S3: VM deleted
  #   method-b  Restore Managed Disks only (disk-only)         — S3, S4: DR drill
  #   method-d  Item-Level Recovery (ILR / file recovery)      — S1, S5: file/data loss
  - name: restoreMethod
    type: string
    default: method-c
    values:
      - method-c
      - method-a
      - method-b
      - method-d
  - name: sourceVmName
    type: string
  - name: sourceResourceGroup
    type: string
  # Subscription ID or name where the source VM lives.
  # Leave as 'none' when the source VM is in the same subscription as the
  # service connection.
  - name: sourceSubscription
    type: string
    default: 'none'
  - name: vaultName
    type: string
  - name: vaultResourceGroup
    type: string
  # Subscription ID or name where the RSV lives.
  # Leave as 'none' when the vault is in the same subscription as the service
  # connection.
  - name: vaultSubscription
    type: string
    default: 'none'
  # Recovery point identifier. Leave as 'none' to restore from the most recent
  # available recovery point (recommended default).
  # Provide a specific ID to pin to an exact point.
  - name: recoveryPointId
    type: string
    default: 'none'
  # ISO-8601 UTC timestamp (e.g. '2026-05-29T14:00:00Z'). Leave as 'none' to
  # restore from the most recent available recovery point.
  # When provided, selects the latest recovery point at or before this time.
  # Provide this OR recoveryPointId, not both.
  - name: recoveryPointTimeUtc
    type: string
    default: 'none'
  # Pre-provisioned staging storage account used during disk restore operations.
  # Required for method-a, method-b, method-c. Not used for method-d.
  # Must match the storage account deployed by the azure-backup-vault Terraform module.
  - name: stagingStorageAccount
    type: string
    default: 'cnpvaultrestorationsprod'
  - name: stagingStorageAccountResourceGroup
    type: string
    default: 'mgmt-infra-prod-rg'
  # Target resource group for method-a and method-b.
  # Leave as 'none' to use the source VM's resource group.
  - name: targetResourceGroup
    type: string
    default: 'none'
  # Target subscription for cross-subscription restores (method-a, method-b).
  # Leave as 'none' to restore within the same subscription.
  # Note: method-c does not support cross-subscription restore.
  - name: targetSubscription
    type: string
    default: 'none'
  # Target VM name for method-a (Create New VM).
  # Leave as 'none' to auto-generate as "${sourceVmName}-restore-<HHMMddmmyy>".
  - name: targetVmName
    type: string
    default: 'none'
  # Target VNet name — required for method-a.
  - name: targetVnetName
    type: string
    default: 'none'
  # Target subnet name — required for method-a.
  - name: targetSubnetName
    type: string
    default: 'none'
  # Target VNet resource group — required for method-a.
  - name: targetVnetResourceGroup
    type: string
    default: 'none'
  - name: restoreTimeoutMinutes
    type: number
    default: 240
  - name: pollSeconds
    type: number
    default: 30
  # dryRun=true (default) performs read-only discovery: lists backup containers,
  # recovery points, and prints the restore command that would be run.
  # No Azure resources are modified. Safe to run at any time.
  # Set dryRun=false to execute the actual restore.
  - name: dryRun
    type: boolean
    default: true

stages:
  # ---------------------------------------------------------------------------
  # Stage 1: Preflight
  # Validates inputs and discovers the recovery point. Passes the selected
  # recovery point ID as an output variable to Stage 2.
  # Runs in dry-run mode regardless of the dryRun parameter — no changes made.
  # ---------------------------------------------------------------------------
  - stage: Preflight
    displayName: 'Stage 1: Preflight — validate inputs and discover recovery point'
    jobs:
      - job: PreflightCheck
        displayName: Discover recovery point
        pool:
          name: ${{ parameters.agentPool }}
        steps:
          - checkout: self

          - script: |
              echo "============================================================"
              echo " Pipeline Inputs - CNP VM Restore"
              echo "============================================================"
              echo "restoreMethod:                ${{ parameters.restoreMethod }}"
              echo "dryRun:                       ${{ parameters.dryRun }}"
              echo "sourceVmName:                 ${{ parameters.sourceVmName }}"
              echo "sourceResourceGroup:          ${{ parameters.sourceResourceGroup }}"
              echo "sourceSubscription:           ${{ parameters.sourceSubscription }}"
              echo "vaultName:                    ${{ parameters.vaultName }}"
              echo "vaultResourceGroup:           ${{ parameters.vaultResourceGroup }}"
              echo "vaultSubscription:            ${{ parameters.vaultSubscription }}"
              echo "recoveryPointId:              ${{ parameters.recoveryPointId }}"
              echo "recoveryPointTimeUtc:         ${{ parameters.recoveryPointTimeUtc }}"
              echo "stagingStorageAccount:        ${{ parameters.stagingStorageAccount }}"
              echo "stagingStorageAccountRG:      ${{ parameters.stagingStorageAccountResourceGroup }}"
              echo "targetResourceGroup:          ${{ parameters.targetResourceGroup }}"
              echo "targetSubscription:           ${{ parameters.targetSubscription }}"
              echo "targetVmName:                 ${{ parameters.targetVmName }}"
              echo "targetVnetName:               ${{ parameters.targetVnetName }}"
              echo "targetSubnetName:             ${{ parameters.targetSubnetName }}"
              echo "targetVnetResourceGroup:      ${{ parameters.targetVnetResourceGroup }}"
              echo "restoreTimeoutMinutes:        ${{ parameters.restoreTimeoutMinutes }}"
              echo "pollSeconds:                  ${{ parameters.pollSeconds }}"
              echo "============================================================"
            displayName: Print pipeline inputs

          - script: |
              set -euo pipefail
              TARGET_VM="${TARGET_VM_NAME}"
              if [[ "${RESTORE_METHOD}" == "method-a" && ( -z "${TARGET_VM}" || "${TARGET_VM}" == "none" ) ]]; then
                TARGET_VM="${SOURCE_VM_NAME}-restore-$(date -u +"%H%M%d%m%y")"
                echo "Auto-generated target VM name: ${TARGET_VM}"
              fi
              echo "##vso[task.setvariable variable=resolvedTargetVmName;isOutput=true]${TARGET_VM}"
            name: resolveTargetVmName
            displayName: Resolve target VM name
            env:
              RESTORE_METHOD: ${{ parameters.restoreMethod }}
              SOURCE_VM_NAME: ${{ parameters.sourceVmName }}
              TARGET_VM_NAME: ${{ parameters.targetVmName }}

          - task: AzureCLI@2
            name: discoverRecoveryPoint
            displayName: Discover recovery point (dry run)
            inputs:
              azureSubscription: ${{ parameters.serviceConnection }}
              visibleAzLogin: false
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                VAULT_SUB_FLAG=""
                if [[ -n "${VAULT_SUBSCRIPTION}" && "${VAULT_SUBSCRIPTION}" != "none" ]]; then
                  VAULT_SUB_FLAG="--subscription ${VAULT_SUBSCRIPTION}"
                fi

                echo "Listing recovery points for VM: ${SOURCE_VM_NAME}..."
                # shellcheck disable=SC2086
                RECOVERY_POINTS=$(az backup recoverypoint list \
                  --vault-name "${VAULT_NAME}" \
                  -g "${VAULT_RESOURCE_GROUP}" \
                  --container-name "${SOURCE_VM_NAME}" \
                  --item-name "${SOURCE_VM_NAME}" \
                  --backup-management-type AzureIaasVM \
                  --workload-type VM \
                  $VAULT_SUB_FLAG \
                  -o json)

                echo "Available recovery points (UTC):"
                echo "$RECOVERY_POINTS" | jq -r \
                  '.[] | "  - \(.name) @ \(.properties.recoveryPointTime) [\(.properties.recoveryPointTierDetails[0].type // "VaultStandard")]"'

                # Select recovery point
                if [[ -n "${RECOVERY_POINT_ID}" && "${RECOVERY_POINT_ID}" != "none" ]]; then
                  SELECTED_RP=$(echo "$RECOVERY_POINTS" | jq -r --arg rp "${RECOVERY_POINT_ID}" \
                    '.[] | select(.name == $rp) | .name' | head -n1)
                  [[ -n "$SELECTED_RP" ]] || { echo "ERROR: Recovery point ${RECOVERY_POINT_ID} not found."; exit 1; }
                elif [[ -n "${RECOVERY_POINT_TIME_UTC}" && "${RECOVERY_POINT_TIME_UTC}" != "none" ]]; then
                  SELECTED_RP=$(echo "$RECOVERY_POINTS" | jq -r --arg ts "${RECOVERY_POINT_TIME_UTC}" '
                    map({name: .name, t: (.properties.recoveryPointTime | gsub("\\.[0-9]+"; "") | gsub("\\+[0-9:]+$"; "Z") | fromdateiso8601)})
                    | map(select(.t <= ($ts | fromdateiso8601)))
                    | sort_by(.t) | last | .name // empty')
                  [[ -n "$SELECTED_RP" ]] || { echo "ERROR: No recovery point found at or before ${RECOVERY_POINT_TIME_UTC}."; exit 1; }
                else
                  SELECTED_RP=$(echo "$RECOVERY_POINTS" | jq -r '
                    map({name: .name, t: (.properties.recoveryPointTime | gsub("\\.[0-9]+"; "") | gsub("\\+[0-9:]+$"; "Z") | fromdateiso8601)})
                    | sort_by(.t) | last | .name // empty')
                  [[ -n "$SELECTED_RP" ]] || { echo "ERROR: No recovery points found for VM ${SOURCE_VM_NAME}."; exit 1; }
                fi

                SELECTED_RP_TIME=$(echo "$RECOVERY_POINTS" | jq -r \
                  --arg rp "$SELECTED_RP" '.[] | select(.name == $rp) | .properties.recoveryPointTime')

                echo ""
                echo "Selected recovery point: ${SELECTED_RP} @ ${SELECTED_RP_TIME}"
                echo "Restore method:          ${RESTORE_METHOD}"
                echo "Dry run:                 ${DRY_RUN}"
                echo "##vso[task.setvariable variable=selectedRecoveryPointId;isOutput=true]${SELECTED_RP}"
            env:
              VAULT_NAME: ${{ parameters.vaultName }}
              VAULT_RESOURCE_GROUP: ${{ parameters.vaultResourceGroup }}
              VAULT_SUBSCRIPTION: ${{ parameters.vaultSubscription }}
              SOURCE_VM_NAME: ${{ parameters.sourceVmName }}
              RECOVERY_POINT_ID: ${{ parameters.recoveryPointId }}
              RECOVERY_POINT_TIME_UTC: ${{ parameters.recoveryPointTimeUtc }}
              RESTORE_METHOD: ${{ parameters.restoreMethod }}
              DRY_RUN: ${{ parameters.dryRun }}

  # ---------------------------------------------------------------------------
  # Stage 2: Restore
  # Executes the VM restore via scripts/restore-vm-from-rsv.sh.
  #
  # APPROVAL GATE: This stage uses an ADO deployment job targeting the
  # 'vm-restore-platops-approval' environment. A PlatOps team member must
  # approve before the restore executes.
  # To configure: ADO → Environments → vm-restore-platops-approval → Approvals.
  # ---------------------------------------------------------------------------
  - stage: Restore
    displayName: 'Stage 2: Restore VM'
    dependsOn: Preflight
    variables:
      selectedRecoveryPointId: $[ stageDependencies.Preflight.PreflightCheck.outputs['discoverRecoveryPoint.selectedRecoveryPointId'] ]
      resolvedTargetVmName: $[ stageDependencies.Preflight.PreflightCheck.outputs['resolveTargetVmName.resolvedTargetVmName'] ]
    jobs:
      - deployment: RestoreVm
        displayName: Execute VM restore
        pool:
          name: ${{ parameters.agentPool }}
        # Approval gate: requires a PlatOps approver before restore runs.
        # Create this environment in ADO and configure required reviewers.
        environment: 'vm-restore-platops-approval'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Execute restore script
                  inputs:
                    azureSubscription: ${{ parameters.serviceConnection }}
                    visibleAzLogin: false
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      chmod +x scripts/restore-vm-from-rsv.sh
                      ./scripts/restore-vm-from-rsv.sh
                  env:
                    VAULT_NAME: ${{ parameters.vaultName }}
                    VAULT_RESOURCE_GROUP: ${{ parameters.vaultResourceGroup }}
                    VAULT_SUBSCRIPTION: ${{ parameters.vaultSubscription }}
                    SOURCE_VM_NAME: ${{ parameters.sourceVmName }}
                    SOURCE_RESOURCE_GROUP: ${{ parameters.sourceResourceGroup }}
                    SOURCE_SUBSCRIPTION: ${{ parameters.sourceSubscription }}
                    RESTORE_METHOD: ${{ parameters.restoreMethod }}
                    RECOVERY_POINT_ID: $(selectedRecoveryPointId)
                    RECOVERY_POINT_TIME_UTC: ${{ parameters.recoveryPointTimeUtc }}
                    STAGING_STORAGE_ACCOUNT: ${{ parameters.stagingStorageAccount }}
                    STAGING_STORAGE_ACCOUNT_RG: ${{ parameters.stagingStorageAccountResourceGroup }}
                    TARGET_RESOURCE_GROUP: ${{ parameters.targetResourceGroup }}
                    TARGET_SUBSCRIPTION: ${{ parameters.targetSubscription }}
                    TARGET_VM_NAME: $(resolvedTargetVmName)
                    TARGET_VNET_NAME: ${{ parameters.targetVnetName }}
                    TARGET_SUBNET_NAME: ${{ parameters.targetSubnetName }}
                    TARGET_VNET_RESOURCE_GROUP: ${{ parameters.targetVnetResourceGroup }}
                    RESTORE_TIMEOUT_MINUTES: ${{ parameters.restoreTimeoutMinutes }}
                    POLL_SECONDS: ${{ parameters.pollSeconds }}
                    DRY_RUN: ${{ parameters.dryRun }}

                - task: PublishBuildArtifacts@1
                  displayName: Publish restore output
                  condition: always()
                  inputs:
                    PathtoPublish: restore-output
                    ArtifactName: restore-output
                    publishLocation: Container

  # ---------------------------------------------------------------------------
  # Stage 3: Validate
  # Confirms the restore produced the expected outcome.
  # Skipped when dryRun=true or restoreMethod=method-d (ILR is operator-driven).
  # ---------------------------------------------------------------------------
  - stage: Validate
    displayName: 'Stage 3: Validate restore'
    dependsOn:
      - Preflight
      - Restore
    condition: |
      and(
        succeeded('Restore'),
        eq('${{ parameters.dryRun }}', 'false'),
        ne('${{ parameters.restoreMethod }}', 'method-d')
      )
    variables:
      resolvedTargetVmName: $[ stageDependencies.Preflight.PreflightCheck.outputs['resolveTargetVmName.resolvedTargetVmName'] ]
    jobs:
      - job: ValidateRestore
        displayName: Validate restored VM or disks
        pool:
          name: ${{ parameters.agentPool }}
        steps:
          - task: AzureCLI@2
            displayName: Validate restore outcome
            inputs:
              azureSubscription: ${{ parameters.serviceConnection }}
              visibleAzLogin: false
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                SOURCE_SUB_FLAG=""
                if [[ -n "${SOURCE_SUBSCRIPTION}" && "${SOURCE_SUBSCRIPTION}" != "none" ]]; then
                  SOURCE_SUB_FLAG="--subscription ${SOURCE_SUBSCRIPTION}"
                fi
                TARGET_SUB_FLAG=""
                if [[ -n "${TARGET_SUBSCRIPTION}" && "${TARGET_SUBSCRIPTION}" != "none" ]]; then
                  TARGET_SUB_FLAG="--subscription ${TARGET_SUBSCRIPTION}"
                fi

                case "${RESTORE_METHOD}" in
                  method-c)
                    echo "Validating method-c: checking VM ${SOURCE_VM_NAME} is running..."
                    # shellcheck disable=SC2086
                    POWER_STATE=$(az vm get-instance-view \
                      --name "${SOURCE_VM_NAME}" \
                      -g "${SOURCE_RESOURCE_GROUP}" \
                      $SOURCE_SUB_FLAG \
                      --query "instanceView.statuses[?starts_with(code,'PowerState/')].displayStatus | [0]" -o tsv)
                    echo "VM power state: ${POWER_STATE}"
                    [[ "$POWER_STATE" == *"running"* ]] || { echo "ERROR: VM is not running after restore."; exit 1; }
                    echo "PASS: VM ${SOURCE_VM_NAME} is running."
                    ;;

                  method-a)
                    TARGET_RG="${TARGET_RESOURCE_GROUP}"
                    [[ "$TARGET_RG" == "none" || -z "$TARGET_RG" ]] && TARGET_RG="${SOURCE_RESOURCE_GROUP}"
                    TARGET_VM="${RESOLVED_TARGET_VM_NAME}"
                    echo "Validating method-a: checking new VM ${TARGET_VM} exists in ${TARGET_RG}..."
                    # shellcheck disable=SC2086
                    POWER_STATE=$(az vm get-instance-view \
                      --name "${TARGET_VM}" \
                      -g "${TARGET_RG}" \
                      $TARGET_SUB_FLAG \
                      --query "instanceView.statuses[?starts_with(code,'PowerState/')].displayStatus | [0]" -o tsv 2>/dev/null || echo "not found")
                    echo "VM power state: ${POWER_STATE}"
                    [[ "$POWER_STATE" != "not found" ]] || { echo "ERROR: Restored VM ${TARGET_VM} not found."; exit 1; }
                    echo "PASS: VM ${TARGET_VM} exists (state: ${POWER_STATE})."
                    ;;

                  method-b)
                    TARGET_RG="${TARGET_RESOURCE_GROUP}"
                    [[ "$TARGET_RG" == "none" || -z "$TARGET_RG" ]] && TARGET_RG="${SOURCE_RESOURCE_GROUP}"
                    echo "Validating method-b: checking restored disks exist in ${TARGET_RG}..."
                    # shellcheck disable=SC2086
                    DISK_COUNT=$(az disk list -g "${TARGET_RG}" $TARGET_SUB_FLAG \
                      --query "length([?contains(name, '${SOURCE_VM_NAME}')])" -o tsv 2>/dev/null || echo 0)
                    echo "Disks found in ${TARGET_RG} containing '${SOURCE_VM_NAME}': ${DISK_COUNT}"
                    [[ "$DISK_COUNT" -gt 0 ]] || { echo "ERROR: No restored disks found in ${TARGET_RG}."; exit 1; }
                    echo "PASS: ${DISK_COUNT} disk(s) found."
                    ;;
                esac
            env:
              RESTORE_METHOD: ${{ parameters.restoreMethod }}
              SOURCE_VM_NAME: ${{ parameters.sourceVmName }}
              SOURCE_RESOURCE_GROUP: ${{ parameters.sourceResourceGroup }}
              SOURCE_SUBSCRIPTION: ${{ parameters.sourceSubscription }}
              TARGET_RESOURCE_GROUP: ${{ parameters.targetResourceGroup }}
              TARGET_SUBSCRIPTION: ${{ parameters.targetSubscription }}
              TARGET_VM_NAME: ${{ parameters.targetVmName }}
              RESOLVED_TARGET_VM_NAME: $(resolvedTargetVmName)
